<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>TGarden Studio | Tiago Jardim</title>
    <!-- GitHub Pages has no server-side routing, so a direct hit on a route like
         /tgarden/projetos/maoka 404s here. This redirects to index.html, encoding
         the original path in the query string so the app can restore it. -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1 // keep the '/tgarden' base segment

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
