<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>TGarden — Painel de mídia</title>
    <!-- Without this, visiting /admin (no trailing slash) makes the browser
         resolve admin.css/admin.js against the parent directory instead of
         /admin/, 404ing both. Computed instead of hardcoded because this
         page is served from different base paths depending on target:
         domain root on Vercel (production), but under /tgarden/ on GitHub
         Pages and local dev (matches vite.config.ts's base). -->
    <script>
      document.write(
        '<base href="' + location.pathname.slice(0, location.pathname.indexOf('/admin') + 6) + '/">',
      )
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;500;700&family=Archivo+Black&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <header class="topbar">
      <span class="dot"></span>
      <span class="label">©TGarden — Painel de mídia</span>
    </header>

    <main id="app" class="wrap">
      <section id="login-screen" class="login">
        <img src="tgarden-mark.svg" alt="TGarden" class="login-mark" />
        <h1>Entrar</h1>
        <p class="hint">Digite a senha que o TGarden te passou.</p>
        <form id="login-form">
          <label class="field">
            <span class="label">Senha</span>
            <input id="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Entrar →</button>
        </form>
        <p id="login-error" class="error" hidden></p>
      </section>

      <section id="panel-screen" class="panel" hidden>
        <div class="panel-head">
          <p class="label text-soft">Conteúdo do site</p>
          <h1>Trocar fotos e vídeos</h1>
          <p class="hint">
            Escolha um item da lista e envie o arquivo novo. O site atualiza sozinho em alguns minutos.
          </p>
        </div>
        <div id="groups"></div>
      </section>
    </main>

    <footer class="closing">
      <p>You don't need anyone to swap a photo. Here, you do it yourself.</p>
    </footer>

    <script src="admin.js"></script>
  </body>
</html>
